server:
  port: 8443
  address: 0.0.0.0
  ssl:
    enabled: true
    key-store: classpath:server.p12
    key-store-type: PKCS12
    key-alias: 1
    key-store-password: 123456
mybatis:
  mapper-locations: classpath:mapper/**Mapper.xml
  configuration: # 配置打印 MyBatis 执行的 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true  #自动驼峰转换

spring:
  datasource:
    url: jdbc:mysql://mysql.sutaiyu.site:3306/java_chatroom?characterEncoding=utf8&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
#  mvc:
#    favicon:
#      enable: false
  profiles:  #多平台配置
    active: dev
  application:
    name: MutiUserChat
#  main:
#    allow-bean-definition-overriding: true

logging:
  file:
    path: /logs
  logback:
    rollingpolicy:
      max-file-size: 1MB
      file-name-pattern: /logs/spring.log.%d{yyyy-MM-dd}.%i.log
  level:
    root: info